events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging 
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Performance 
  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  resolver 127.0.0.11 valid=5s ipv6=off;

  map $host $auth_upstream     { 
    default "auth:3001";    
    }
  map $host $upload_upstream   { 
    default "upload:3002";  
    }
  map $host $asset_upstream    { 
    default "asset:3003";   
    }
  map $host $gateway_upstream  { 
    default "gateway:3000"; 
    }
  map $host $web_upstream      { 
    default "web:5173";     
    }

  server {
    listen 80;
    server_name localhost;

    location ~* ^/api/upload/core {
      set $upstream $upload_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;

      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_request_buffering   off;
      client_max_body_size      0;
      proxy_read_timeout        3600s;
      proxy_send_timeout        3600s;
      proxy_connect_timeout     60s;
    }

    # Auth Service
    location /api/auth/ {
      set $upstream $auth_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      client_max_body_size 1m;
    }

    # Upload Service 
    location /api/upload/ {
      set $upstream $upload_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      client_max_body_size 1m;
    }

    # Asset Service
    location /api/assets/ {
      set $upstream $asset_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      client_max_body_size 1m;
    }

    # Share links (public — no auth required)
    location /api/share/ {
      set $upstream $asset_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      client_max_body_size 1m;
    }

    # Health checks
    location /health/auth {
      set $upstream $auth_upstream;
      proxy_pass http://$upstream/health/auth;
      proxy_http_version 1.1;
    }

    location /health/upload {
      set $upstream $upload_upstream;
      proxy_pass http://$upstream/health/upload;
      proxy_http_version 1.1;
    }

    location /health/asset {
      set $upstream $asset_upstream;
      proxy_pass http://$upstream/health/asset;
      proxy_http_version 1.1;
    }

    location /health/gateway {
      set $upstream $gateway_upstream;
      proxy_pass http://$upstream/health/gateway;
      proxy_http_version 1.1;
    }

    # Unified Swagger UI 
    location = /api-docs {
      return 301 /api-docs/;
    }    
    
    
    location /api-docs/ {
      set $upstream $gateway_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
    }

    # Raw OpenAPI JSON 
    location = /api-docs.json {
      set $upstream $gateway_upstream;
      proxy_pass         http://$upstream/spec.json;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Connection        "";
    }

    # Frontend 
    location / {
      set $upstream $web_upstream;
      proxy_pass         http://$upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }

    #Minio
    location /minio/ {
    proxy_pass         http://minio:9000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              minio:9000;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_buffering    off;
    client_max_body_size 0;
  }
  }
}
