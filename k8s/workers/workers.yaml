apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: dam-platform
  labels:
    app: workers
spec:
  selector:
    matchLabels:
      app: workers
  template:
    metadata:
      labels:
        app: workers
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: workers
          image: dam-platform/workers:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: NODE_ENV
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dam-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dam-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: RABBITMQ_VHOST
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dam-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET_ASSETS
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: MINIO_BUCKET_ASSETS
            - name: MINIO_BUCKET_CHUNKS
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: MINIO_BUCKET_CHUNKS
            - name: MINIO_BUCKET_RENDITIONS
              valueFrom:
                configMapKeyRef:
                  name: dam-config
                  key: MINIO_BUCKET_RENDITIONS
            - name: METRICS_PORT
              value: "9090"
          resources:
            requests:
              cpu: "500m"       
              memory: "512Mi"
            limits:
              cpu: "2000m"      
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: workers-service
  namespace: dam-platform
  labels:
    app: workers
spec:
  selector:
    app: workers
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
