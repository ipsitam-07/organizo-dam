apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dam-ingress
  namespace: dam-platform
  annotations:
    spec.ingressClassname: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-redirect-from: "~^http://[^/]+/(.*)"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "/$1"
spec:
  rules:
    - http:
        paths:
          # Auth service
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          # Upload service 
          - path: /api/upload(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: upload-service
                port:
                  number: 3002

          # Asset service
          - path: /api/assets(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: asset-service
                port:
                  number: 3003

          - path: /api/share(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: asset-service
                port:
                  number: 3003

          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web-service
                port:
                  number: 80

---
# LoadBalancer Service for upload service
apiVersion: v1
kind: Service
metadata:
  name: upload-loadbalancer
  namespace: dam-platform
  labels:
    app: upload
spec:
  selector:
    app: upload
  ports:
    - name: http
      port: 80
      targetPort: 3002
  type: LoadBalancer
