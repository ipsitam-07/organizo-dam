apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dam-ingress
  namespace: dam-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /api/upload
        pathType: Prefix
        backend:
          service:
            name: upload-service
            port:
              number: 3002
      - path: /api/assets
        pathType: Prefix
        backend:
          service:
            name: asset-service
            port:
              number: 3003
      - path: /api/share
        pathType: Prefix
        backend:
          service:
            name: asset-service
            port:
              number: 3003
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
